name: tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt
      # Tests use a stub embedder and an injected fake LLM — no torch, no API key.
      # Install the package without its heavy deps, then just the light test deps.
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . --no-deps
          # Pin tree-sitter-language-pack <1.9: the 1.9 native rewrite returns a
          # non-tree_sitter.Language from get_language(), breaking AST chunking for
          # pack-only languages (Go/Ruby/...). See coderag/ingest/languages.py.
          pip install numpy tree-sitter tree-sitter-python rank-bm25 pathspec pytest 'tree-sitter-language-pack<1.9'
      - name: Lint (real-bug rules — pyflakes + bugbear)
        run: |
          pip install ruff
          ruff check coderag tests scripts
      - name: Run tests
        # CODERAG_REQUIRE_LANGS flips the Go/Ruby grammar tests from skip-if-absent
        # to a hard failure (the pack is installed above), so a silently-incompatible
        # pack (e.g. >=1.9) can't quietly drop AST coverage without reddening CI.
        env:
          CODERAG_REQUIRE_LANGS: "1"
        run: pytest -q

  # Defense-in-depth the original PYTHONHASHSEED flake lacked: determinism is now
  # enforced in code, and this actively hunts any NEW hash-/set-ordering dependency.
  hash-seeds:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . --no-deps
          pip install numpy tree-sitter tree-sitter-python rank-bm25 pathspec pytest 'tree-sitter-language-pack<1.9'
      - name: Run tests under several PYTHONHASHSEEDs
        env:
          CODERAG_REQUIRE_LANGS: "1"
        run: |
          for s in 1 2 3 17 42; do
            echo "=== PYTHONHASHSEED=$s ==="
            PYTHONHASHSEED=$s pytest -q
          done
